name: signals

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: signals
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install numpy pandas requests xgboost scikit-learn

      - name: Run signal job
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          COINS: "BTCUSDT,ETHUSDT,SOLUSDT"
        run: python signal_job.py

      - name: Commit state
        run: |
          git config user.name "signals-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json signals.json log.csv
          git diff --cached --quiet || git commit -m "state [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
